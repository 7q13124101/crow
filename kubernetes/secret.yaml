
# Secret for crow
# WARNING: Replace placeholder values before deploying!
# Consider using external secrets management (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: crow-secrets
  namespace: crow
  labels:
    app.kubernetes.io/name: crow
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  # Auth (always enabled) — generate with: openssl rand -hex 32
  SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
  API_KEY: "CHANGE_ME_IN_PRODUCTION"
  # PostgreSQL
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  # Redis
  REDIS_PASSWORD: ""
  LOGFIRE_TOKEN: ""
  SENTRY_DSN: ""

  # LLM API Keys
  OPENAI_API_KEY: ""
